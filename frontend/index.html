<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Filmivõtete asukohtade planeerija." />
    <title>FrameScout</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css?v=mobile-photo-1" />
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script defer src="/app.js?v=mobile-photo-1"></script>
  </head>

  <body>
    <section
      id="auth-screen"
      class="auth-screen"
      role="dialog"
      aria-labelledby="auth-title"
      hidden
    >
      <div class="auth-card">
        <button
          id="close-auth-panel"
          class="auth-close-button"
          type="button"
          aria-label="Sulge"
        >
          ×
        </button>

        <a class="brand auth-brand" href="/" aria-label="FrameScout avaleht">
          <span class="brand__mark" aria-hidden="true">FS</span>
          <strong>FrameScout</strong>
        </a>

        <div>
          <h1 id="auth-title">Logi sisse</h1>
          <p id="auth-intro">Sinu võttepaigad, fotod ja võtteolud ühes kohas.</p>
        </div>

        <form id="auth-form">
          <div id="auth-name-field" class="field auth-name-field" hidden>
            <label for="auth-display-name">Nimi</label>
            <input
              id="auth-display-name"
              name="display_name"
              minlength="2"
              maxlength="120"
              autocomplete="name"
            />
          </div>

          <div class="field">
            <label for="auth-email">E-post</label>
            <input
              id="auth-email"
              name="email"
              type="email"
              maxlength="320"
              autocomplete="email"
              required
            />
          </div>

          <div class="field">
            <label for="auth-password">Parool</label>
            <input
              id="auth-password"
              name="password"
              type="password"
              minlength="12"
              maxlength="128"
              autocomplete="current-password"
              required
            />
          </div>

          <button id="auth-submit" class="save-button" type="submit">
            Logi sisse
          </button>
          <p id="auth-status" class="form-status" role="status"></p>
        </form>

        <div class="auth-divider"><span>või</span></div>

        <button id="google-login-button" class="google-login-button" type="button">
          <span class="google-mark" aria-hidden="true">G</span>
          Jätka Google'iga
        </button>

        <button id="toggle-auth-mode" class="auth-mode-button" type="button">
          Loo uus konto
        </button>
      </div>
    </section>

    <header class="appbar">
      <a class="brand" href="/" aria-label="FrameScout avaleht">
        <span class="brand__mark" aria-hidden="true">FS</span>
        <strong>FrameScout</strong>
      </a>

      <div id="guest-actions" class="guest-actions">
        <button id="open-login" type="button">Logi sisse</button>
        <button id="open-register" type="button">Loo konto</button>
      </div>

      <div id="user-actions" class="appbar__account" hidden>
        <span id="current-user-name" class="current-user-name"></span>
        <span id="location-count" class="location-count">Laadin...</span>
        <button id="logout-button" class="logout-button" type="button">
          Logi välja
        </button>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <section class="map-panel" aria-label="Võttepaikade kaart">
        <div id="map"></div>

        <nav class="map-actions" aria-label="Kaardi tööriistad">
          <button id="show-locations" type="button">Asukohad</button>
          <button id="start-add-mode" type="button">+ Lisa</button>
        </nav>

        <div id="selection-hint" class="selection-hint" hidden>
          <strong>Vali võttepaik kaardilt</strong>
          <button id="cancel-map-selection" type="button">Tühista</button>
        </div>
      </section>

      <aside id="side-panel" class="side-panel" aria-label="Võttepaikade paneel">
        <header class="panel-header">
          <h1 id="panel-title">Asukohad</h1>
          <button id="close-panel" class="close-button" type="button" aria-label="Sulge paneel">
            ×
          </button>
        </header>

        <section id="locations-view">
          <div id="locations-list" class="locations-list"></div>
        </section>

        <section id="form-view" hidden>
          <p id="selected-location" class="selection-status" role="status">
            Vali asukoht kaardil.
          </p>

          <form id="location-form">
            <input id="latitude" name="latitude" type="hidden" />
            <input id="longitude" name="longitude" type="hidden" />

            <div class="field">
              <label for="name">Võttepaiga nimi</label>
              <input
                id="name"
                name="name"
                minlength="2"
                maxlength="120"
                placeholder="Näiteks Kopli liinide sisehoov"
                autocomplete="off"
                required
              />
            </div>

            <div class="field">
              <label for="description">Produktsioonimärkmed</label>
              <textarea
                id="description"
                name="description"
                maxlength="2000"
                placeholder="Ligipääs, parkimine, heli, valgus..."
              ></textarea>
            </div>

            <label class="check-row" for="no-fly-zone-status">
              <input id="no-fly-zone-status" name="no-fly-zone-status" type="checkbox" />
              <span>
                <strong>Õhuruum vajab lisakontrolli</strong>
                <small>Ainult drooni kasutamisel</small>
              </span>
            </label>

            <details class="coordinate-details">
              <summary>Koordinaadid käsitsi</summary>
              <div class="coordinate-grid">
                <div class="field">
                  <label for="latitude-manual">Laiuskraad</label>
                  <input id="latitude-manual" type="number" min="-90" max="90" step="0.000001" />
                </div>
                <div class="field">
                  <label for="longitude-manual">Pikkuskraad</label>
                  <input id="longitude-manual" type="number" min="-180" max="180" step="0.000001" />
                </div>
              </div>
            </details>

            <button class="save-button" type="submit">Salvesta</button>
            <p id="form-status" class="form-status" role="status"></p>
          </form>
        </section>
      </aside>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="photo-viewer" class="photo-viewer" aria-labelledby="photo-viewer-caption">
      <button id="close-photo-viewer" class="photo-viewer__close" type="button" aria-label="Sulge pildivaatur">
        ×
      </button>
      <button id="previous-photo" class="photo-viewer__navigation" type="button" aria-label="Eelmine pilt">
        ←
      </button>
      <figure class="photo-viewer__figure">
        <img id="photo-viewer-image" alt="" />
        <figcaption id="photo-viewer-caption"></figcaption>
      </figure>
      <button id="next-photo" class="photo-viewer__navigation" type="button" aria-label="Järgmine pilt">
        →
      </button>
    </dialog>
  </body>
</html>
